<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal {
      width: 100%;
      max-width: 430px;
      min-height: 560px;
      background: #fff;
      border-radius: 8px;
      padding: 105px 24px 55px;
      box-shadow: 0 8px 25px rgba(255, 255, 255, 0.18);
    }

    .modal h1 {
      text-align: center;
      font-size: 28px;
      font-weight: 800;
      color: #111;
      margin-bottom: 72px;
      letter-spacing: 0.2px;
    }

    .form-group {
      margin-bottom: 34px;
    }

    .form-group label {
      display: block;
      font-size: 23px;
      color: #555;
      margin-bottom: 14px;
      font-weight: 400;
    }

    .input-box {
      width: 100%;
      height: 64px;
      border: 1.5px solid #e1e1e1;
      border-radius: 6px;
      display: flex;
      align-items: center;
      padding: 0 20px 0 26px;
      background: #fff;
    }

    .input-box input {
      width: 100%;
      border: none;
      outline: none;
      font-size: 24px;
      color: #777;
      letter-spacing: 3px;
      background: transparent;
    }

    .eye-icon {
      width: 31px;
      height: 31px;
      flex-shrink: 0;
      position: relative;
      margin-left: 12px;
    }

    .eye-icon::before {
      content: "";
      position: absolute;
      width: 28px;
      height: 18px;
      border: 4px solid #666;
      border-radius: 50%;
      left: 0;
      top: 6px;
      transform: rotate(10deg);
    }

    .eye-icon::after {
      content: "";
      position: absolute;
      width: 39px;
      height: 4px;
      background: #666;
      border-radius: 10px;
      left: -4px;
      top: 14px;
      transform: rotate(45deg);
    }

    .submit-btn {
      width: 100%;
      border: none;
      outline: none;
      background: #ff9800;
      color: #fff;
      font-size: 22px;
      font-weight: 700;
      padding: 22px 18px;
      border-radius: 50px;
      cursor: pointer;
      margin-top: 12px;
      transition: 0.25s ease;
      white-space: nowrap;
    }

    .submit-btn:hover {
      background: #f28c00;
      transform: translateY(-2px);
    }

    .submit-btn:active {
      transform: scale(0.98);
    }

    @media (max-width: 480px) {
      .modal {
        max-width: 100%;
        min-height: 540px;
        padding: 95px 20px 45px;
      }

      .modal h1 {
        font-size: 25px;
        margin-bottom: 68px;
      }

      .form-group {
        margin-bottom: 30px;
      }

      .form-group label {
        font-size: 21px;
      }

      .input-box {
        height: 60px;
        padding: 0 18px 0 24px;
      }

      .input-box input {
        font-size: 22px;
      }

      .submit-btn {
        font-size: 18px;
        padding: 21px 12px;
      }
    }
  </style>
</head>
<body>

  <div class="modal">
    <h1>Reset your Password</h1>

    <form>
      <div class="form-group">
        <label for="new-password">New Password</label>

        <div class="input-box">
          <input
            id="new-password"
            type="password"
            value="***********"
          />
          <span class="eye-icon"></span>
        </div>
      </div>

      <div class="form-group">
        <label for="confirm-password">Re-type New Password</label>

        <div class="input-box">
          <input
            id="confirm-password"
            type="password"
            value="***********"
          />
          <span class="eye-icon"></span>
        </div>
      </div>

      <button type="submit" class="submit-btn">
        Send Password Reset link
      </button>
    </form>
  </div>

</body>
</html>
