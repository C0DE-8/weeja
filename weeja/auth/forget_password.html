<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password Modal</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal {
      width: 100%;
      max-width: 430px;
      min-height: 560px;
      background: #fff;
      border-radius: 8px;
      padding: 150px 28px 55px;
      text-align: center;
      box-shadow: 0 8px 25px rgba(255, 255, 255, 0.18);
    }

    .password-icon {
      color: #f000d4;
      margin-bottom: 70px;
      position: relative;
      height: 75px;
      font-weight: 800;
    }

    .password-icon .question {
      position: absolute;
      left: 50%;
      top: -20px;
      transform: translateX(5px);
      font-size: 78px;
      line-height: 1;
    }

    .password-icon .stars {
      position: absolute;
      left: 50%;
      top: 42px;
      transform: translateX(-82px);
      font-size: 43px;
      letter-spacing: 5px;
      line-height: 1;
    }

    .password-icon .dot {
      position: absolute;
      left: 50%;
      top: 50px;
      transform: translateX(-10px);
      width: 18px;
      height: 18px;
      background: #f000d4;
      border-radius: 50%;
    }

    .modal h1 {
      font-size: 27px;
      font-weight: 800;
      color: #111;
      margin-bottom: 55px;
      letter-spacing: 0.2px;
    }

    .modal p {
      font-size: 21px;
      line-height: 1.45;
      color: #222;
      max-width: 370px;
      margin: 0 auto 70px;
    }

    .reset-btn {
      width: 100%;
      border: none;
      outline: none;
      background: #ff9800;
      color: #fff;
      font-size: 21px;
      font-weight: 700;
      padding: 22px 18px;
      border-radius: 50px;
      cursor: pointer;
      transition: 0.25s ease;
      white-space: nowrap;
    }

    .reset-btn:hover {
      background: #f28c00;
      transform: translateY(-2px);
    }

    .reset-btn:active {
      transform: scale(0.98);
    }

    @media (max-width: 480px) {
      .modal {
        max-width: 100%;
        min-height: 540px;
        padding: 140px 22px 45px;
      }

      .password-icon {
        margin-bottom: 65px;
      }

      .password-icon .question {
        font-size: 72px;
      }

      .password-icon .stars {
        font-size: 39px;
        transform: translateX(-76px);
      }

      .password-icon .dot {
        top: 49px;
        width: 17px;
        height: 17px;
      }

      .modal h1 {
        font-size: 25px;
        margin-bottom: 50px;
      }

      .modal p {
        font-size: 19px;
        margin-bottom: 68px;
      }

      .reset-btn {
        font-size: 18px;
        padding: 21px 14px;
      }
    }
  </style>
</head>
<body>

  <div class="modal">
    <div class="password-icon">
      <span class="stars">***</span>
      <span class="question">?</span>
      <span class="dot"></span>
    </div>

    <h1>Forgot your Password?</h1>

    <p>
      A link to reset your password will be sent to your email address
    </p>

    <button class="reset-btn">
      Send Password Reset link
    </button>
  </div>

</body>
</html>
