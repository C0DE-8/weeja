<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Joined Pool Successfully</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #0d3264;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 88px 18px;
    }

    .modal-card {
      width: 100%;
      max-width: 430px;
      min-height: 620px;
      background: #fff;
      border-radius: 6px;
      padding: 195px 20px 55px;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.18);
    }

    .success-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 56px;
      position: relative;
    }

    .success-icon::before {
      content: "";
      position: absolute;
      inset: 0;
      border: 7px solid #10c735;
      border-right-color: transparent;
      border-radius: 50%;
      transform: rotate(-25deg);
    }

    .success-icon::after {
      content: "";
      position: absolute;
      width: 38px;
      height: 20px;
      border-left: 8px solid #10c735;
      border-bottom: 8px solid #10c735;
      border-radius: 4px;
      left: 19px;
      top: 13px;
      transform: rotate(-45deg);
    }

    .message {
      max-width: 280px;
      margin: 0 auto 48px;
      font-size: 22px;
      line-height: 1.25;
      font-weight: 800;
      color: #111;
    }

    .home-btn {
      width: 100%;
      height: 48px;
      border: none;
      border-radius: 50px;
      background: #ff9800;
      color: #fff;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.25s ease;
    }

    .home-btn:hover {
      background: #f28c00;
      transform: translateY(-2px);
    }

    .home-btn:active {
      transform: scale(0.98);
    }

    @media (max-width: 480px) {
      body {
        padding: 70px 14px;
      }

      .modal-card {
        max-width: 100%;
        min-height: 610px;
        padding: 190px 18px 50px;
      }

      .success-icon {
        width: 60px;
        height: 60px;
        margin-bottom: 54px;
      }

      .success-icon::before {
        border-width: 6px;
      }

      .success-icon::after {
        width: 35px;
        height: 18px;
        border-left-width: 7px;
        border-bottom-width: 7px;
        left: 18px;
        top: 13px;
      }

      .message {
        font-size: 21px;
        margin-bottom: 46px;
      }

      .home-btn {
        font-size: 17px;
      }
    }
  </style>
</head>
<body>

  <div class="modal-card">
    <div class="success-icon"></div>

    <h1 class="message">
      You have successfully<br />
      joined this pool!
    </h1>

    <button class="home-btn">
      Return to Homepage
    </button>
  </div>

</body>
</html>
