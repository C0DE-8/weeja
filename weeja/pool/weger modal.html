<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wager Modal</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #0d3264;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 88px 18px;
    }

    .wager-card {
      width: 100%;
      max-width: 430px;
      min-height: 620px;
      background: #fff;
      border-radius: 6px;
      padding: 48px 20px 55px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.18);
    }

    .title {
      font-size: 20px;
      font-weight: 800;
      color: #111;
      margin-bottom: 34px;
    }

    .answer-box {
      background: #f5f5f5;
      border-radius: 5px;
      padding: 18px 20px 20px;
      margin-bottom: 24px;
    }

    .answer-label {
      display: block;
      color: #666;
      font-size: 17px;
      font-weight: 800;
      margin-bottom: 16px;
    }

    .answer-value {
      display: block;
      color: #222;
      font-size: 20px;
      font-weight: 800;
    }

    .section-title {
      font-size: 18px;
      font-weight: 800;
      color: #222;
      margin-bottom: 14px;
    }

    .amount-box {
      height: 52px;
      border: 1px solid #e1e1e1;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 26px;
      margin-bottom: 10px;
      background: #fff;
    }

    .amount {
      color: #10c735;
      font-size: 20px;
      font-weight: 800;
    }

    .max {
      color: #1555a8;
      font-size: 17px;
      font-weight: 800;
    }

    .balance {
      display: flex;
      align-items: center;
      gap: 9px;
      color: #888;
      font-size: 15px;
      margin-bottom: 34px;
    }

    .coin {
      width: 18px;
      height: 18px;
      background: #1555a8;
      color: #fff;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 800;
      line-height: 1;
    }

    .confirm-btn,
    .cancel-btn {
      width: 100%;
      height: 48px;
      border-radius: 50px;
      font-size: 19px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.25s ease;
    }

    .confirm-btn {
      border: none;
      background: #ff9800;
      color: #fff;
      margin-bottom: 10px;
    }

    .cancel-btn {
      border: 1.5px solid #ff1d2e;
      background: #fff;
      color: #ff0015;
    }

    .confirm-btn:hover {
      background: #f28c00;
      transform: translateY(-2px);
    }

    .cancel-btn:hover {
      background: #fff3f4;
      transform: translateY(-2px);
    }

    .confirm-btn:active,
    .cancel-btn:active {
      transform: scale(0.98);
    }

    @media (max-width: 480px) {
      body {
        padding: 70px 14px;
      }

      .wager-card {
        max-width: 100%;
        min-height: 610px;
        padding: 46px 18px 50px;
      }

      .title {
        font-size: 19px;
        margin-bottom: 32px;
      }

      .answer-label,
      .max {
        font-size: 16px;
      }

      .answer-value,
      .amount {
        font-size: 19px;
      }

      .section-title {
        font-size: 17px;
      }

      .confirm-btn,
      .cancel-btn {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>

  <div class="wager-card">
    <h1 class="title">Chelsea Vs Arsenal</h1>

    <div class="answer-box">
      <span class="answer-label">My Answer</span>
      <span class="answer-value">Chelsea</span>
    </div>

    <h2 class="section-title">Enter Wager Amount</h2>

    <div class="amount-box">
      <span class="amount">5.00</span>
      <span class="max">MAX</span>
    </div>

    <div class="balance">
      <span>Available Balance:</span>
      <span class="coin">T</span>
      <span>50 USDT</span>
    </div>

    <button class="confirm-btn">Confirm Wager</button>
    <button class="cancel-btn">Cancel Pool</button>
  </div>

</body>
</html>
