<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pool Card</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .pool-card {
      width: 100%;
      max-width: 560px;
      background: #fff;
      border-radius: 12px;
      padding: 28px 28px 34px;
      box-shadow: 0 8px 25px rgba(255, 255, 255, 0.16);
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 28px;
    }

    .pool-title {
      font-size: 25px;
      line-height: 1.28;
      font-weight: 800;
      color: #111;
      max-width: 460px;
    }

    .share-icon {
      width: 34px;
      height: 34px;
      position: relative;
      flex-shrink: 0;
      margin-top: 6px;
    }

    .share-icon span {
      position: absolute;
      width: 9px;
      height: 9px;
      border: 3px solid #555;
      border-radius: 50%;
      background: #fff;
    }

    .share-icon span:nth-child(1) {
      left: 2px;
      top: 13px;
    }

    .share-icon span:nth-child(2) {
      right: 2px;
      top: 2px;
    }

    .share-icon span:nth-child(3) {
      right: 2px;
      bottom: 2px;
    }

    .share-icon::before,
    .share-icon::after {
      content: "";
      position: absolute;
      width: 22px;
      height: 3px;
      background: #555;
      border-radius: 10px;
      left: 10px;
      transform-origin: left center;
    }

    .share-icon::before {
      top: 14px;
      transform: rotate(-28deg);
    }

    .share-icon::after {
      top: 18px;
      transform: rotate(28deg);
    }

    .info-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 28px;
    }

    .time-info {
      display: grid;
      grid-template-columns: 32px 1fr;
      column-gap: 12px;
      row-gap: 8px;
      color: #777;
      font-size: 21px;
      line-height: 1.2;
    }

    .clock-icon {
      width: 24px;
      height: 24px;
      border: 3px solid #777;
      border-radius: 50%;
      position: relative;
      margin-top: 2px;
      grid-row: span 2;
    }

    .clock-icon::before {
      content: "";
      position: absolute;
      width: 3px;
      height: 8px;
      background: #777;
      left: 9px;
      top: 4px;
      border-radius: 10px;
    }

    .clock-icon::after {
      content: "";
      position: absolute;
      width: 8px;
      height: 3px;
      background: #777;
      left: 9px;
      top: 11px;
      border-radius: 10px;
    }

    .status {
      color: #22d950;
      font-weight: 800;
      margin-left: 12px;
    }

    .amount {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #ff1025;
      font-size: 25px;
      font-weight: 800;
      white-space: nowrap;
      padding-top: 2px;
    }

    .coin {
      width: 31px;
      height: 31px;
      background: #ff293b;
      color: #fff;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 800;
      line-height: 1;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .option-btn {
      width: 100%;
      height: 64px;
      border: none;
      border-radius: 40px;
      color: #fff;
      font-size: 25px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.25s ease;
    }

    .option-btn.blue {
      background: #2f63aa;
    }

    .option-btn.orange {
      background: #ffb238;
    }

    .option-btn.gray {
      background: #70706e;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }

    .option-btn:hover {
      transform: translateY(-2px);
      filter: brightness(0.96);
    }

    .option-btn:active {
      transform: scale(0.98);
    }

    .down-icon {
      width: 16px;
      height: 16px;
      border-right: 4px solid #fff;
      border-bottom: 4px solid #fff;
      transform: rotate(45deg);
      margin-top: -6px;
    }

    @media (max-width: 520px) {
      body {
        padding: 0;
        background: #fff;
        align-items: flex-start;
      }

      .pool-card {
        max-width: 100%;
        border-radius: 0;
        box-shadow: none;
        padding: 25px 20px 30px;
      }

      .pool-title {
        font-size: 23px;
      }

      .info-row {
        gap: 10px;
      }

      .time-info {
        font-size: 19px;
        grid-template-columns: 28px 1fr;
        column-gap: 10px;
      }

      .amount {
        font-size: 22px;
        gap: 8px;
      }

      .coin {
        width: 29px;
        height: 29px;
        font-size: 20px;
      }

      .option-btn {
        height: 62px;
        font-size: 22px;
      }
    }

    @media (max-width: 390px) {
      .pool-card {
        padding: 22px 16px 28px;
      }

      .pool-title {
        font-size: 21px;
      }

      .info-row {
        flex-direction: column;
        margin-bottom: 26px;
      }

      .amount {
        align-self: flex-end;
      }

      .option-btn {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>

  <div class="pool-card">
    <div class="card-header">
      <h1 class="pool-title">
        Who will win the AMVCA best actor in comedy (movie/tvseries)
      </h1>

      <div class="share-icon">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>

    <div class="info-row">
      <div class="time-info">
        <span class="clock-icon"></span>

        <div>
          Pool Ends:
          <span>01:00</span>
          <span>PM</span>
        </div>

        <div>
          15 Apr, 2022
          <span class="status">Open</span>
        </div>
      </div>

      <div class="amount">
        <span class="coin">T</span>
        <span>50 USDT</span>
      </div>
    </div>

    <div class="options">
      <button class="option-btn blue">Broda shaggi/Samuel Perry</button>
      <button class="option-btn orange">Deyemi Okanlawon</button>
      <button class="option-btn blue">Shawn Faqua</button>

      <button class="option-btn gray">
        View more options
        <span class="down-icon"></span>
      </button>
    </div>
  </div>

</body>
</html>
