<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pool Created Successfully</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal {
      width: 100%;
      max-width: 430px;
      min-height: 690px;
      background: #fff;
      border-radius: 6px;
      padding: 225px 18px 55px;
      text-align: center;
      box-shadow: 0 8px 25px rgba(255, 255, 255, 0.16);
    }

    .success-icon {
      width: 82px;
      height: 82px;
      margin: 0 auto 76px;
      position: relative;
    }

    .success-icon::before {
      content: "";
      position: absolute;
      inset: 0;
      border: 8px solid #10c735;
      border-right-color: transparent;
      border-radius: 50%;
      transform: rotate(-25deg);
    }

    .success-icon::after {
      content: "";
      position: absolute;
      width: 48px;
      height: 25px;
      border-left: 9px solid #10c735;
      border-bottom: 9px solid #10c735;
      border-radius: 4px;
      left: 25px;
      top: 18px;
      transform: rotate(-45deg);
    }

    .modal h1 {
      font-size: 25px;
      line-height: 1.3;
      font-weight: 800;
      color: #111;
      margin-bottom: 86px;
      letter-spacing: 0.2px;
    }

    .home-btn {
      width: 100%;
      height: 56px;
      border: none;
      border-radius: 50px;
      background: #ff9800;
      color: #fff;
      font-size: 20px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.25s ease;
    }

    .home-btn:hover {
      background: #f28c00;
      transform: translateY(-2px);
    }

    .home-btn:active {
      transform: scale(0.98);
    }

    @media (max-width: 480px) {
      body {
        padding: 0;
        background: #111;
      }

      .modal {
        max-width: 100%;
        min-height: 100vh;
        border-radius: 0;
        padding: 220px 18px 50px;
      }

      .success-icon {
        width: 76px;
        height: 76px;
        margin-bottom: 72px;
      }

      .success-icon::before {
        border-width: 7px;
      }

      .success-icon::after {
        width: 44px;
        height: 23px;
        border-left-width: 8px;
        border-bottom-width: 8px;
        left: 23px;
        top: 17px;
      }

      .modal h1 {
        font-size: 23px;
        margin-bottom: 82px;
      }

      .home-btn {
        font-size: 19px;
      }
    }
  </style>
</head>
<body>

  <div class="modal">
    <div class="success-icon"></div>

    <h1>Pool Created Successfully!</h1>

    <button class="home-btn">
      Return to Homepage
    </button>
  </div>

</body>
</html>
